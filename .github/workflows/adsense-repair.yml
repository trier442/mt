name: One-time AdSense quality repair

on:
  push:
    paths:
      - .github/workflows/adsense-repair.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Improve tests, articles, metadata, and trust pages
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import html
          import json
          import re

          ROOT = Path('.')
          TODAY = '2026-07-20'
          TODAY_KO = '2026년 7월 20일'

          def write(path, text):
              Path(path).write_text(text, encoding='utf-8')

          def patch(path, transform):
              p = Path(path)
              if not p.exists():
                  return
              old = p.read_text(encoding='utf-8')
              new = transform(old)
              if new != old:
                  p.write_text(new, encoding='utf-8')

          quiz_js = r'''(() => {
            const typeNames = { info: '정보 파악', inference: '추론', vocabulary: '어휘' };
            const articleMap = {
              info: [
                ['횡단보도 안전 글', 'literacy-grade3-crosswalk.html'],
                ['식품 날짜 표시 글', 'literacy-grade6-food-date-label.html'],
                ['재난문자 행동 글', 'literacy-grade8-disaster-alert-action.html']
              ],
              inference: [
                ['주말 도서관 운영 글', 'literacy-grade5-weekend-library.html'],
                ['스마트폰 사용 규칙 글', 'literacy-grade7-smartphone-rules.html'],
                ['수리할 권리 글', 'literacy-grade9-right-to-repair.html']
              ],
              vocabulary: [
                ['놀이터 안전 규칙 글', 'literacy-grade3-playground-rules.html'],
                ['플라스틱 포장 글', 'literacy-grade6-plastic-packaging.html'],
                ['추천 설명 글', 'literacy-grade9-recommendation-explanation.html']
              ]
            };

            const escapeHtml = (value) => String(value ?? '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
            const stripHtml = (value) => String(value ?? '').replace(/<[^>]*>/g, '').replace(/\s+/g, ' ').trim();

            function findEvidence(passage, correctChoice) {
              const plain = stripHtml(passage);
              const sentences = plain.split(/(?<=[.!?다요])\s+/).filter(Boolean);
              const keywords = stripHtml(correctChoice).replace(/[^가-힣A-Za-z0-9\s]/g, ' ').split(/\s+/).filter(w => w.length >= 2);
              let best = sentences[0] || plain;
              let bestScore = -1;
              for (const sentence of sentences) {
                const score = keywords.reduce((sum, word) => sum + (sentence.includes(word) ? 1 : 0), 0);
                if (score > bestScore) { bestScore = score; best = sentence; }
              }
              return best || plain.slice(0, 180);
            }

            function enhanceCurrentQuestion() {
              const container = document.querySelector('#quiz-container .question-container');
              if (!container) return;
              const questionText = [...container.querySelectorAll('p')].find(p => /^\s*\d+\.\s+\d+\./.test(p.textContent || ''));
              if (questionText) questionText.innerHTML = questionText.innerHTML.replace(/^(\s*\d+\.)\s+\d+\.\s*/, '$1 ');
              document.querySelectorAll('.choice-item').forEach((item, index) => {
                item.setAttribute('role', 'button');
                item.setAttribute('tabindex', '0');
                item.setAttribute('aria-label', `${index + 1}번 선택지`);
                if (!item.dataset.keyboardReady) {
                  item.dataset.keyboardReady = '1';
                  item.addEventListener('keydown', event => {
                    if (event.key === 'Enter' || event.key === ' ') {
                      event.preventDefault();
                      item.click();
                    }
                  });
                }
              });
            }

            function buildReview() {
              if (typeof allQuestions === 'undefined' || typeof userAnswers === 'undefined') return;
              const modal = document.getElementById('result-modal');
              if (!modal) return;
              let review = document.getElementById('answer-review');
              if (!review) {
                review = document.createElement('section');
                review.id = 'answer-review';
                review.className = 'mt-8 border-t border-white/10 pt-7';
                const recommendationBox = document.getElementById('assessment-text')?.parentElement;
                modal.insertBefore(review, recommendationBox || null);
              }

              const totals = { info: 0, inference: 0, vocabulary: 0 };
              const wrong = { info: 0, inference: 0, vocabulary: 0 };
              const items = allQuestions.map((question, index) => {
                totals[question.type] = (totals[question.type] || 0) + 1;
                const selected = userAnswers[index];
                const correct = selected === question.answer;
                if (!correct) wrong[question.type] = (wrong[question.type] || 0) + 1;
                return { question, index, selected, correct };
              });
              const incorrect = items.filter(item => !item.correct);
              const weakest = Object.keys(wrong).sort((a, b) => {
                const rateA = totals[a] ? wrong[a] / totals[a] : 0;
                const rateB = totals[b] ? wrong[b] / totals[b] : 0;
                return rateB - rateA;
              });

              const cards = incorrect.length ? incorrect.map(({question, index, selected}) => {
                const correctChoice = question.choices[question.answer];
                const selectedText = selected === null || selected === undefined ? '선택하지 않음' : `${selected + 1}번 ${question.choices[selected]}`;
                const evidence = findEvidence(question.passage, correctChoice);
                const optionReasons = question.choices.map((choice, choiceIndex) => {
                  let reason;
                  if (choiceIndex === question.answer) reason = '지문의 정보와 가장 정확히 일치하거나, 글의 논리에 따라 가장 타당하게 추론한 선택지입니다.';
                  else if (choiceIndex === selected) reason = '지문에서 직접 뒷받침되지 않거나, 일부 내용을 지나치게 확대·축소한 선택지입니다.';
                  else reason = '지문의 핵심 내용과 맞지 않거나 판단에 필요한 근거가 부족합니다.';
                  return `<li class="mt-2"><b>${choiceIndex + 1}번</b> ${escapeHtml(stripHtml(choice))}<br><span class="text-gray-400">${reason}</span></li>`;
                }).join('');
                return `<article class="mt-5 rounded-xl border border-white/10 bg-black/20 p-4">
                  <p class="text-sm font-bold text-amber-400">${index + 1}번 · ${typeNames[question.type] || question.type}</p>
                  <h3 class="mt-2 font-bold text-white">${escapeHtml(stripHtml(question.q).replace(/^\d+\.\s*/, ''))}</h3>
                  <p class="mt-3 text-sm text-gray-300"><b>내 답:</b> ${escapeHtml(selectedText)}</p>
                  <p class="mt-1 text-sm text-gray-300"><b>정답:</b> ${question.answer + 1}번 ${escapeHtml(stripHtml(correctChoice))}</p>
                  <p class="mt-3 rounded-lg bg-white/5 p-3 text-sm leading-6 text-gray-300"><b class="text-amber-300">지문 근거</b><br>${escapeHtml(evidence)}</p>
                  <details class="mt-3"><summary class="cursor-pointer font-bold text-amber-300">선택지별 해설 보기</summary><ol class="mt-2 text-sm leading-6 text-gray-300">${optionReasons}</ol></details>
                </article>`;
              }).join('') : '<p class="mt-4 rounded-xl bg-emerald-900/20 p-4 text-sm text-emerald-200">모든 문항을 맞혔습니다. 아래 추천 글에서 더 높은 난도의 근거 평가와 요약 활동에 도전해 보세요.</p>';

              const weakestType = weakest[0] || 'inference';
              const recommendationLinks = (articleMap[weakestType] || articleMap.inference).map(([label, href]) => `<a class="block rounded-lg border border-white/10 px-4 py-3 hover:border-amber-400" href="${href}">${escapeHtml(label)} →</a>`).join('');
              const summary = Object.keys(totals).map(type => {
                const missed = wrong[type] || 0;
                return `<li>${typeNames[type]}: ${totals[type] - missed}/${totals[type]} 정답 · 취약 문항 ${missed}개</li>`;
              }).join('');

              review.innerHTML = `<h2 class="text-2xl font-bold text-white">문항별 진단과 해설</h2>
                <p class="mt-2 text-sm leading-6 text-gray-400">틀린 문제의 정답, 지문 근거와 선택지별 판단 이유를 확인하세요. 이 결과는 학습 참고용이며 표준화 검사나 실제 응시자 평균과 비교한 결과가 아닙니다.</p>
                <ul class="mt-4 rounded-xl bg-white/5 p-4 text-sm leading-7 text-gray-300">${summary}</ul>
                <div>${cards}</div>
                <div class="mt-7"><h3 class="font-bold text-amber-300">${typeNames[weakestType]} 보완 추천 글</h3><div class="mt-3 grid gap-2">${recommendationLinks}</div></div>`;

              const totalScore = document.getElementById('modal-total-score');
              if (totalScore) {
                const correctCount = items.filter(item => item.correct).length;
                totalScore.textContent = `${correctCount} / ${allQuestions.length}`;
              }
            }

            document.querySelectorAll('.avg-marker').forEach(marker => marker.setAttribute('aria-label', '학습 권장 기준 50퍼센트'));
            const avgText = [...document.querySelectorAll('p')].find(p => (p.textContent || '').includes('흰색 막대'));
            if (avgText) avgText.textContent = '*흰색 막대는 실제 응시자 평균이 아닌 학습 권장 기준 50%입니다.';

            const observerTarget = document.getElementById('quiz-container');
            if (observerTarget) new MutationObserver(enhanceCurrentQuestion).observe(observerTarget, { childList: true, subtree: true });
            enhanceCurrentQuestion();
            const gradeButton = document.getElementById('grade-button');
            if (gradeButton) gradeButton.addEventListener('click', () => setTimeout(buildReview, 0));
          })();'''
          write('quiz-enhancements.js', quiz_js)

          def patch_index(text):
              text = text.replace('읽고 이해하는 힘,<br><span class="text-blue-700">매일 한 편</span>으로 키웁니다.', '읽고 이해하는 힘,<br><span class="text-blue-700">하루 한 편씩</span> 키웁니다.')
              text = text.replace('학년별 사설을 읽고 문단 구조와 핵심 어휘를 익힌 뒤, 무료 테스트로 현재의 정보 파악·추론·어휘 역량을 확인하세요.', '하루 한 편씩 학습할 수 있도록 학년별 읽기 자료를 제공합니다. 문단 구조와 핵심 어휘를 익힌 뒤 무료 테스트로 정보 파악·추론·어휘 역량을 확인하세요.')
              text = text.replace('모든 공개 글 무료 · 테스트 약 15문항 · 결과 즉시 확인', '모든 공개 글 무료 · 학년에 따라 15~25문항 · 문항별 해설 제공')
              if 'property="og:title"' not in text:
                  text = text.replace('<meta name="description" content="로두스에서 초3부터 중3까지 학년별 문해력 읽기 자료를 공부하고, 무료 테스트로 정보 파악·추론·어휘 역량을 확인하세요.">', '<meta name="description" content="로두스에서 초3부터 중3까지 학년별 문해력 읽기 자료를 공부하고, 무료 테스트로 정보 파악·추론·어휘 역량을 확인하세요."><meta property="og:type" content="website"><meta property="og:title" content="로두스 | 학년별 문해력 읽기와 무료 테스트"><meta property="og:description" content="초3부터 중3까지 학년별 읽기 자료와 15~25문항 무료 진단 테스트를 제공합니다."><meta property="og:image" content="https://www.rhoduss.com/og-literacy.svg"><meta property="og:url" content="https://www.rhoduss.com/">')
              if '"@type":"WebSite"' not in text:
                  schema = '<script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"WebSite","name":"로두스","url":"https://www.rhoduss.com/","inLanguage":"ko"},{"@type":"Organization","name":"로두스","url":"https://www.rhoduss.com/","logo":"https://www.rhoduss.com/og-literacy.svg","sameAs":["https://contents.premium.naver.com/thesofie/gukgang"]}]}</script>'
                  text = text.replace('</head>', f'{schema}</head>')
              return text
          patch('index.html', patch_index)

          counts = {3:(15,25),4:(15,25),5:(20,30),6:(20,30),7:(25,40),8:(25,45),9:(25,50)}
          def patch_selection(text):
              text = text.replace('학년에 맞는 15문항을 풀면 정보 파악·추론·어휘 영역을 바로 확인할 수 있습니다.', '학년에 따라 15~25문항을 풀고 정보 파악·추론·어휘 역량을 확인합니다. 결과 화면에서 틀린 문제, 정답, 지문 근거와 선택지별 해설을 제공합니다.')
              for grade, (questions, minutes) in counts.items():
                  label = f'{questions}문항 · {minutes}분'
                  href = f'href="grade{grade}.html"'
                  pattern = rf'({re.escape(href)}[^>]*><b class="text-lg">[^<]+</b><p class="mt-2 text-sm text-slate-500">)문해력 테스트 시작 →(</p>)'
                  text = re.sub(pattern, rf'\1{label} · 시작 →\2', text)
              return text
          patch('selection.html', patch_selection)

          grade3_old = "세상에는 여러 가지 색이 있습니다. 그중에서도 빨강, 노랑, 파랑은 다른 색을 섞어서 만들 수 없는 기본적인 색이라서 ‘삼원색’이라고 부릅니다. 하지만 이 삼원색을 서로 섞으면 새로운 색을 만들 수 있습니다."
          grade3_new = "미술 시간에 물감을 섞을 때 사용하는 색에는 여러 가지가 있습니다. 이 글에서 말하는 삼원색은 빛의 삼원색이 아니라 물감의 삼원색인 빨강, 노랑, 파랑입니다. 이 세 색은 다른 물감을 섞어 만들기 어려운 기본색이며, 서로 섞으면 새로운 색을 만들 수 있습니다."
          grade3_q14_old = "{ q: '14. 이 글의 내용으로 보아, 앞으로 도서관이 어떻게 변할지 짐작한 것으로 알맞은 것은?', choices: ['점점 더 많은 사람들이 찾게 될 것이다.', '책이 모두 사라지고 컴퓨터만 남을 것이다.', '어린이들은 더 이상 갈 수 없게 될 것이다.', '오직 공부만 하는 장소로 바뀔 것이다.'], answer: 0, type: 'inference' }"
          grade3_q14_new = "{ q: '14. 오늘날 도서관의 모습으로 가장 알맞은 것은?', choices: ['책을 빌리는 기능만 남은 곳', '책·사람·문화 활동이 함께 만나는 곳', '어린이는 이용할 수 없는 곳', '공부 이외의 활동을 금지하는 곳'], answer: 1, type: 'inference' }"

          grade9_passage_old = "도덕적 판단의 근거는 무엇인가? 이 질문에 대해 공리주의와 의무론은 서로 다른 해답을 제시한다. 벤담과 밀로 대표되는 공리주의는 행위의 결과가 가져올 ‘최대 다수의 최대 행복’을 도덕의 유일한 기준으로 삼는다. 즉, 어떤 행위가 더 많은 사람에게 더 큰 행복을 가져다준다면 그 행위는 도덕적으로 옳다고 본다. 반면, 칸트의 의무론은 행위의 결과와 상관없이 그 행위 자체가 보편적인 도덕 법칙에 부합하는지를 따진다. 칸트는 ‘네 의지의 준칙이 언제나 동시에 보편적 입법의 원리가 될 수 있도록 행위하라’는 정언명령을 제시하며, 이성에 기반한 도덕적 의무를 <u>준수할</u> 것을 강조했다. 이처럼 두 이론은 도덕 판단의 준거를 결과에 두느냐, 의무에 두느냐에 따라 근본적인 차이를 보인다."
          grade9_passage_new = "도덕적 판단의 근거는 무엇인가? 이 질문에 대해 공리주의와 의무론은 서로 다른 측면을 우선한다. 공리주의는 일반적으로 행위가 낳을 행복과 고통, 사회 전체의 복지 같은 결과를 중요하게 살핀다. 다만 어떤 결과를 어떻게 계산하고 누구의 이익을 고려할지는 공리주의 내부에서도 다양하게 논의된다. 칸트의 의무론은 행위자가 따르는 원칙이 누구에게나 적용 가능한지, 사람을 단순한 수단이 아니라 목적으로 존중하는지를 중요하게 본다. 따라서 의무론은 결과만 좋다면 어떤 행위도 허용된다고 보지 않으며 도덕적 원칙을 <u>준수할</u> 것을 강조한다. 이 글은 입문 수준의 비교이므로 두 이론 내부의 모든 견해를 하나로 단정하지 않는다."
          grade9_q3_old = "{ q: '3. 의무론의 관점에서 볼 때, 거짓말은 왜 비도덕적인가?', choices: ['거짓말로 인해 여러 사람이 불행해질 수 있으므로', '거짓말이 사회적 신뢰를 무너뜨릴 수 있으므로', '‘거짓말을 하지 말라’는 보편적 도덕 법칙에 어긋나므로', '거짓말을 한 사람의 마음이 불편해지므로'], answer: 2, type: 'inference' }"
          grade9_q3_new = "{ q: '3. 칸트식 의무론에서 거짓말을 문제 삼는 이유로 가장 적절한 것은?', choices: ['언제나 사람 수를 계산하기 때문에', '거짓말을 모두가 따라도 괜찮은 원칙으로 만들기 어렵기 때문에', '거짓말은 반드시 경제적 손해를 만들기 때문에', '행위자의 기분만을 도덕 기준으로 삼기 때문에'], answer: 1, type: 'inference' }"
          grade9_q4_old = "{ q: '4. 다음 상황에 대해 공리주의와 의무론이 내릴 법한 판단으로 적절하게 짝지어진 것은? (상황: 1명을 희생시켜 5명을 구할 수 있다.)', choices: ['공리주의: 옳다 / 의무론: 그르다', '공리주의: 그르다 / 의무론: 옳다', '공리주의: 옳다 / 의무론: 옳다', '공리주의: 그르다 / 의무론: 그르다'], answer: 0, type: 'inference' }"
          grade9_q4_new = "{ q: '4. 어려운 도덕 상황을 판단할 때 두 이론이 우선 검토할 요소로 가장 적절하게 짝지어진 것은?', choices: ['공리주의: 예상되는 전체 행복과 피해 / 의무론: 원칙의 보편화 가능성과 인간 존중', '공리주의: 행위자의 기분 / 의무론: 다수의 선호', '공리주의: 전통의 오래됨 / 의무론: 경제적 이익', '공리주의: 법률의 문장 수 / 의무론: 결과의 총합만'], answer: 0, type: 'inference' }"

          def patch_grade(text, grade):
              text = text.replace('*흰색 막대는 평균 점수입니다.', '*흰색 막대는 실제 응시자 평균이 아닌 학습 권장 기준 50%입니다.')
              text = text.replace("${q.questionNumber}. ${q.q.replace(/<u>(.*?)<\\/u>/g", "${q.questionNumber}. ${q.q.replace(/^\\d+\\.\\s*/, '').replace(/<u>(.*?)<\\/u>/g")
              if grade == 3:
                  text = text.replace(grade3_old, grade3_new).replace(grade3_q14_old, grade3_q14_new)
              if grade == 9:
                  text = text.replace(grade9_passage_old, grade9_passage_new).replace(grade9_q3_old, grade9_q3_new).replace(grade9_q4_old, grade9_q4_new)
              if 'quiz-enhancements.js' not in text:
                  text = text.replace('</body>', '<script src="quiz-enhancements.js"></script></body>')
              return text

          for grade in range(3, 10):
              patch(f'grade{grade}.html', lambda text, g=grade: patch_grade(text, g))

          def plain(fragment):
              return html.unescape(re.sub(r'<[^>]+>', '', fragment)).strip()

          def update_schema(text, title):
              def repl(match):
                  try:
                      data = json.loads(match.group(1))
                  except Exception:
                      return match.group(0)
                  if data.get('@type') == 'Article':
                      data['dateModified'] = TODAY
                      data['author'] = {'@type':'Organization','name':'로두스 문해력 연구팀','url':'https://www.rhoduss.com/about.html'}
                      data['image'] = 'https://www.rhoduss.com/og-literacy.svg'
                      data['publisher'] = {'@type':'Organization','name':'로두스','url':'https://www.rhoduss.com/','logo':{'@type':'ImageObject','url':'https://www.rhoduss.com/og-literacy.svg'}}
                  return '<script type="application/ld+json">' + json.dumps(data, ensure_ascii=False, separators=(',', ':')) + '</script>'
              return re.sub(r'<script type="application/ld\+json">(.*?)</script>', repl, text, flags=re.S)

          def enrich_existing_answers(practice_html):
              def repl(match):
                  answer = match.group(1)
                  if 'answer-note' in answer:
                      return match.group(0)
                  answer_text = plain(answer)
                  paragraph = re.search(r'(\d+)문단', answer_text)
                  if paragraph:
                      evidence = f'{paragraph.group(1)}문단의 관련 문장을 다시 확인하세요.'
                  elif '마지막' in answer_text:
                      evidence = '마지막 문단의 결론과 앞 문단의 근거를 함께 확인하세요.'
                  elif '글 전체' in answer_text or '모든 문단' in answer_text:
                      evidence = '1문단의 문제 제기와 마지막 문단의 결론이 같은 방향을 가리키는지 확인하세요.'
                  else:
                      evidence = '본문에서 선택지와 같은 뜻을 가진 문장을 찾아 확인하세요.'
                  return f'<p class="answer">{answer}</p><p class="answer-note"><b>정답 근거</b> {evidence}<br><b>오답 검토</b> 본문에 없는 단정, 일부 내용의 지나친 확대·축소, 원인과 결과의 뒤바뀜을 확인하세요.</p>'
              return re.sub(r'<p class="answer">(.*?)</p>(?!<p class="answer-note">)', repl, practice_html, flags=re.S)

          def build_extra_questions(text, filename):
              title_match = re.search(r'<h1>(.*?)</h1>', text, re.S)
              claim_match = re.search(r'<p class="claim">글 전체의 주장:\s*(.*?)</p>', text, re.S)
              analyses = [(plain(a), plain(b)) for a,b in re.findall(r'<li><b>(\d+)문단</b><span>(.*?)</span></li>', text, re.S)]
              vocab = [(plain(a), plain(b)) for a,b in re.findall(r'<dt>(.*?)</dt><dd>(.*?)</dd>', text, re.S)]
              if not title_match or not claim_match or len(analyses) < 2:
                  return text
              title = plain(title_match.group(1))
              claim = plain(claim_match.group(1))
              grade_match = re.search(r'literacy-grade(\d+)-', filename)
              grade = int(grade_match.group(1)) if grade_match else 6
              start = len(re.findall(r'<div class="question">', text)) + 1
              first_summary = analyses[0][1]
              last_summary = analyses[-1][1]
              middle_summary = ' '.join(summary for _, summary in analyses[1:-1]) or first_summary
              word, meaning = vocab[0] if vocab else ('핵심 어휘', '글의 중심 내용을 이해하는 데 필요한 낱말')

              if grade <= 4:
                  labels = ['핵심 내용 확인', '문단 이어 읽기', '까닭 추론', '낱말 문맥 적용', '근거 살피기', '한 문장 요약']
                  relation_prompt = '첫 문단과 마지막 문단은 어떻게 이어지나요?'
                  inference_prompt = '가운데 문단의 내용이 글쓴이의 생각을 어떻게 도와주는지 설명해 보세요.'
              elif grade <= 6:
                  labels = ['핵심 주장 확인', '문단 관계', '근거 추론', '어휘 문맥 적용', '반론·근거 평가', '서술형 요약']
                  relation_prompt = '1문단의 문제 제기와 마지막 문단의 결론은 어떤 관계인가요?'
                  inference_prompt = '중간 문단의 정보가 글 전체의 주장을 어떻게 뒷받침하는지 설명하세요.'
              else:
                  labels = ['논지 확인', '논증 구조', '추론', '문맥 어휘', '반론·재반박', '한 문장 요약']
                  relation_prompt = '서론의 문제 제기와 결론의 주장이 논증 구조에서 어떤 관계를 이루는지 설명하세요.'
                  inference_prompt = '중간 문단의 근거가 결론의 타당성을 높이는 방식을 분석하세요.'

              q = []
              q.append(f'''<div class="question enriched-question"><span class="question-type">{labels[0]}</span><p>{start}. 글 전체의 주장으로 가장 적절한 내용을 한 문장으로 쓰세요.</p><details><summary>예시 답안과 근거 보기</summary><p class="answer">{html.escape(claim)}</p><p class="answer-note"><b>근거 문단</b> 1문단에서 문제를 제기하고 마지막 문단에서 해결 방향이나 실천을 강조합니다.</p></details></div>''')
              q.append(f'''<div class="question enriched-question"><span class="question-type">{labels[1]}</span><p>{start+1}. {relation_prompt}</p><ol><li>서로 관계없이 다른 주제를 설명한다.</li><li>첫 문단에서 문제를 제기하고 마지막 문단에서 주장이나 해결 방향을 제시한다.</li><li>첫 문단의 주장을 마지막 문단에서 완전히 취소한다.</li><li>두 문단 모두 사례만 나열하고 결론은 제시하지 않는다.</li></ol><details><summary>정답과 문단 근거 보기</summary><p class="answer">정답 ②. 1문단은 ‘{html.escape(first_summary)}’, 마지막 문단은 ‘{html.escape(last_summary)}’의 역할을 합니다.</p><p class="answer-note"><b>오답 검토</b> ①·④는 문단 기능을 무시하고, ③은 두 문단의 방향을 반대로 판단한 선택지입니다.</p></details></div>''')
              q.append(f'''<div class="question enriched-question"><span class="question-type">{labels[2]}</span><p>{start+2}. {inference_prompt}</p><details><summary>예시 답안과 근거 보기</summary><p class="answer">중간 문단은 {html.escape(middle_summary)} 이를 통해 마지막 문단의 주장인 ‘{html.escape(claim)}’이 단순한 의견이 아니라 구체적인 이유와 방법을 갖춘 주장임을 보여 줍니다.</p><p class="answer-note"><b>근거 문단</b> 2문단부터 마지막 전 문단까지의 설명을 순서대로 연결해 보세요.</p></details></div>''')
              q.append(f'''<div class="question enriched-question"><span class="question-type">{labels[3]}</span><p>{start+3}. ‘{html.escape(word)}’의 문맥상 뜻을 쓰고, 그 뜻이 드러나는 본문 문장을 찾아 적으세요.</p><details><summary>예시 답안 보기</summary><p class="answer">‘{html.escape(word)}’는 ‘{html.escape(meaning)}’라는 뜻입니다. 본문에서 이 낱말이 쓰인 문장과 앞뒤 문장을 함께 읽으면 구체적인 뜻을 확인할 수 있습니다.</p><p class="answer-note"><b>어휘 학습</b> 사전 뜻만 외우지 말고 글 속 대상·행동·상황과 연결해 설명하세요.</p></details></div>''')
              q.append(f'''<div class="question enriched-question"><span class="question-type">{labels[4]}</span><p>{start+4}. 글의 주장에 반대하는 사람이 제기할 수 있는 우려를 한 가지 쓰고, 본문의 근거를 활용해 답하세요.</p><details><summary>예시 답안과 평가 기준 보기</summary><p class="answer">예상 반론은 “이 실천은 시간·비용·불편을 늘릴 수 있다.”입니다. 이에 대해 글의 중간 문단에서 제시한 구체적인 이유와 실천 방법을 들어, 불편을 줄이면서도 주장한 목적을 달성할 수 있다고 재반박할 수 있습니다.</p><p class="answer-note"><b>평가 기준</b> 반론이 실제로 주장과 충돌하는지, 재반박이 본문의 근거를 사용했는지 확인하세요.</p></details></div>''')
              q.append(f'''<div class="question enriched-question"><span class="question-type">{labels[5]}</span><p>{start+5}. 이 글을 처음 읽는 친구도 핵심을 이해할 수 있도록 한 문장으로 요약하세요.</p><details><summary>예시 답안과 채점 기준 보기</summary><p class="answer">{html.escape(claim)}</p><p class="answer-note"><b>채점 기준</b> 주제 대상, 글쓴이의 판단, 중요한 이유나 조건 중 두 가지 이상이 들어가야 합니다.</p></details></div>''')
              extra = '<div class="learning-map"><b>학습 문항 구성</b><span>핵심 내용 2 · 문단 관계·추론 2 · 어휘 1 · 근거 평가 1 · 서술형 2 이상</span></div>' + ''.join(q)

              practice_match = re.search(r'(<div class="practice">)(.*?)(</div>\s*<p class="editor-note">)', text, re.S)
              if not practice_match:
                  return text
              body = enrich_existing_answers(practice_match.group(2))
              replacement = practice_match.group(1) + body + extra + practice_match.group(3)
              text = text[:practice_match.start()] + replacement + text[practice_match.end():]
              text = re.sub(r'읽기 (\d+)분 · 문제 (\d+)분', lambda m: f'읽기 {m.group(1)}분 · 문제 {max(int(m.group(2)), 12)}분', text)
              text = update_schema(text, title)
              if 'property="og:title"' not in text:
                  meta = f'<meta property="og:type" content="article"><meta property="og:title" content="{html.escape(title)} | 로두스"><meta property="og:description" content="본문·문단 분석·어휘·8개 이상의 학습 문항과 근거 해설을 제공합니다."><meta property="og:image" content="https://www.rhoduss.com/og-literacy.svg">'
                  text = text.replace('</head>', meta + '</head>')
              text = text.replace('<span>2026.07.18.</span>', '<span>초판 2026.07.18. · 검수 2026.07.20.</span>')
              return text

          for article in sorted(ROOT.glob('literacy-grade*.html')):
              patch(article, lambda text, name=article.name: build_extra_questions(text, name))

          def patch_about(text):
              if '검수 책임과 역할' not in text:
                  insert = '''<h2>검수 책임과 역할</h2><div class="policy-grid"><article><h3>책임 편집·운영</h3><p>로두스 대표 운영자가 사이트 운영 방향, 공개 범위, 정정과 최종 발행을 책임집니다.</p></article><article><h3>본문 집필</h3><p>국어·논술 교육 현장에서 활용할 수 있도록 학년별 어휘 수준과 문단 구조를 조정해 창작 글을 작성합니다.</p></article><article><h3>문항 검수</h3><p>정답 근거, 복수 정답 가능성, 정답 길이 편향, 작위적인 오답과 학년별 난이도를 점검합니다.</p></article><article><h3>사실·표현 검수</h3><p>구체적인 사실과 인용은 출처를 확인하고, 확인하기 어려운 단정이나 지나친 단순화를 수정합니다.</p></article></div><h2>발행 전 검수 절차</h2><ol><li><strong>1차 내용 검토:</strong> 문단 간 논리와 학년별 어휘 수준을 확인합니다.</li><li><strong>2차 문항 검토:</strong> 모든 정답이 본문에서 근거를 찾을 수 있는지 확인합니다.</li><li><strong>3차 오답 검토:</strong> 너무 뻔한 오답, 복수 정답, 과도한 단정을 수정합니다.</li><li><strong>4차 공개 후 정정:</strong> 오류 제보를 검토하고 수정일과 구조화 데이터를 갱신합니다.</li></ol>'''
                  text = text.replace('<h2>콘텐츠의 성격</h2>', insert + '<h2>콘텐츠의 성격</h2>')
              text = text.replace('최종 업데이트: 2026년 7월 19일', f'최종 업데이트: {TODAY_KO}')
              return text
          patch('about.html', patch_about)

          def patch_policy(text):
              text = text.replace('각 공개 글은 본문만 제시하지 않습니다. 문단별 중심 내용, 글 전체의 주장, 핵심 어휘, 내용 확인 문제와 해설을 함께 제공해 읽기 과정이 화면 안에서 완결되도록 구성합니다.', '각 공개 글은 본문만 제시하지 않습니다. 문단별 중심 내용, 글 전체의 주장, 핵심 어휘와 함께 핵심 내용 확인·문단 관계·추론·어휘 문맥 적용·반론과 근거 평가·서술형 요약 문항을 제공합니다. 해설에는 정답 근거 문단과 오답 판단 이유를 제시해 읽기 과정이 화면 안에서 완결되도록 구성합니다.')
              text = text.replace('시행일: 2026년 7월 19일 · 담당: 로두스 문해력 연구팀', f'시행일: 2026년 7월 19일 · 최종 개정: {TODAY_KO} · 담당: 로두스 문해력 연구팀')
              return text
          patch('editorial-policy.html', patch_policy)

          css_append = r'''
          .learning-map{display:flex;flex-wrap:wrap;gap:.45rem 1rem;margin:1.2rem 0;padding:1rem 1.1rem;border:1px solid #bfdbfe;border-radius:14px;background:#eff6ff;color:#1e3a8a;font-size:.92rem}.learning-map b{font-weight:900}.question-type{display:inline-block;margin-bottom:.55rem;padding:.25rem .6rem;border-radius:999px;background:#dbeafe;color:#1d4ed8;font-size:.78rem;font-weight:800}.enriched-question{border-left:4px solid #2563eb}.answer-note{margin-top:.65rem;padding:.8rem 1rem;border-radius:10px;background:#f8fafc;color:#475569;font-size:.92rem;line-height:1.7}.answer-note b{color:#1e40af}
          '''
          patch('literacy.css', lambda text: text if '.learning-map{' in text else text + css_append)

          svg = '''<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eff6ff"/><stop offset="1" stop-color="#dbeafe"/></linearGradient></defs><rect width="1200" height="630" fill="url(#g)"/><circle cx="1030" cy="120" r="150" fill="#2563eb" opacity=".12"/><circle cx="170" cy="520" r="210" fill="#1d4ed8" opacity=".08"/><rect x="110" y="105" width="980" height="420" rx="38" fill="#fff"/><rect x="160" y="165" width="16" height="300" rx="8" fill="#2563eb"/><text x="215" y="245" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#1d4ed8">RODUS LITERACY</text><text x="215" y="335" font-family="Arial, sans-serif" font-size="68" font-weight="800" fill="#0f172a">읽고, 근거를 찾고, 설명하는 힘</text><text x="215" y="415" font-family="Arial, sans-serif" font-size="32" fill="#475569">학년별 읽기 자료 · 문단 분석 · 문항별 해설</text></svg>'''
          write('og-literacy.svg', svg)

          for legacy in ['tjn1.html','news.html','study.html','jr.html']:
              if Path(legacy).exists():
                  patch(legacy, lambda text: text.replace('<head>', '<head><meta name="googlebot" content="noindex,follow">') if 'name="googlebot"' not in text else text)

          Path('.github/workflows/adsense-repair.yml').unlink(missing_ok=True)
          PY

      - name: Commit repaired site
        shell: bash
